<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Management System</title>
    <style>
        :root {
            --bg-display: #E6E6FA; /* Azul pálido/blanquecino [cite: 4] */
            --border-color: #333; /* Gris oscuro/negro [cite: 4, 12] */
            --start-color: #00FF00; /* Verde vibrante [cite: 8] */
            --clear-color: #FF0000; /* Rojo vibrante [cite: 10] */
            --font-main: 'Arial', 'Roboto', sans-serif; /* [cite: 5, 12] */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: var(--font-main);
        }

        #app {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Display Container [cite: 3] */
        .display-container {
            background-color: var(--bg-display);
            border: 5px solid var(--border-color); /* [cite: 12] */
            border-radius: 40px; /* [cite: 3] */
            padding: 40px 20px;
            margin-bottom: 30px;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main-time {
            font-size: 70px; /* Ajustado para acomodar dd:hh:mm:ss [cite: 12] */
            font-weight: bold;
            color: var(--border-color);
        }

        .ms-time {
            font-size: 28px; /* [cite: 13] */
            position: absolute;
            bottom: 15px;
            right: 40px;
            color: var(--border-color);
        }

        /* Controls [cite: 7] */
        .controls {
            display: flex;
            justify-content: center;
            gap: 30px; /* [cite: 14] */
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px; /* [cite: 14] */
            font-size: 20px;
            font-weight: bold;
            border: 5px solid var(--border-color); /* [cite: 9, 11] */
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.95); }
        .btn:hover { filter: brightness(1.1); }

        .btn-start { background-color: var(--start-color); color: #000; }
        .btn-clear { background-color: var(--clear-color); color: #000; }
        .btn-mode { background-color: #888; color: #fff; margin: 10px; }
        .btn-num { background-color: #fff; padding: 15px 25px; min-width: 70px; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app">
        </div>
    <script src="script.js"></script>
</body>
</html>
